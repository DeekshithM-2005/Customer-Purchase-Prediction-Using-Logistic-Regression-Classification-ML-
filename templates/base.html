<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Customer Purchase Prediction Using Logistic Regression Classification">
    <title>{% block title %}Home{% endblock %} | Customer Purchase Prediction</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>(function(){var t=localStorage.getItem('cpp-theme');if(t==='black')document.documentElement.setAttribute('data-theme','black');})();</script>
</head>
<body>
    <!-- Background Effects -->
    <div class="bg-grid"></div>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <span class="brand-icon">📊</span>
                <span class="brand-text">Customer Purchase Prediction</span>
            </a>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>
            <div class="nav-right" id="navRight">
                <ul class="nav-links">
                    <li><a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Home</a></li>
                    <li><a href="/predict" class="nav-link {% if request.path == '/predict' %}active{% endif %}">Predict</a></li>
                </ul>
                <div class="theme-switcher">
                    <button class="theme-btn theme-btn-skyblue active" data-theme="skyblue" title="Sky Blue"></button>
                    <button class="theme-btn theme-btn-black" data-theme="black" title="Black"></button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>Customer Purchase Prediction Using Logistic Regression Classification &mdash; MADE BY DEEKSHITH</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
